*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#08090c;--bg2:#0e1017;--bg3:#14161e;--border:#1e2030;--text:#e8e9ed;--muted:#8b8fa0;--dim:#4a4e5f;--accent:#7aa2ff}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;line-height:1.6;overflow-x:hidden}
body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.02'/%3E%3C/svg%3E");pointer-events:none;z-index:9999}
.container{max-width:1100px;margin:0 auto;padding:0 40px}

nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(8,9,12,.9);backdrop-filter:blur(24px);border-bottom:1px solid rgba(30,32,48,.5)}
nav .inner{max-width:1100px;margin:0 auto;padding:18px 40px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo img{height:28px;width:auto}
.logo-text{font-family:'DM Serif Display',serif;font-size:19px;color:var(--text)}.logo-text span{color:var(--accent)}
nav ul{display:flex;gap:32px;list-style:none}
nav a{color:var(--muted);text-decoration:none;font-size:14px;font-weight:500;transition:color .3s}nav a:hover{color:var(--accent)}
.nav-cta{color:var(--accent);border:1px solid rgba(122,162,255,.3);padding:8px 24px;border-radius:100px;font-size:13px;font-weight:600;transition:all .3s}.nav-cta:hover{background:var(--accent);color:var(--bg)}

.page-header{padding:160px 0 60px;text-align:center}
.page-header h1{font-family:'DM Serif Display',serif;font-size:clamp(32px,4vw,52px);font-weight:400;margin-bottom:16px}
.page-header h1 em{font-style:italic;color:var(--accent)}
.page-header p{font-size:17px;color:var(--muted);max-width:500px;margin:0 auto;font-weight:300;line-height:1.7}
.back-link{display:inline-flex;align-items:center;gap:6px;color:var(--accent);text-decoration:none;font-size:14px;font-weight:500;margin-bottom:24px;transition:opacity .2s}.back-link:hover{opacity:.7}

.testimonial-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px;padding:40px 0 120px}
.t-card{border:1px solid var(--border);border-radius:16px;overflow:hidden;background:var(--bg2);transition:border-color .3s}
.t-card:hover{border-color:rgba(122,162,255,.15)}
.t-card img{width:100%;height:auto;display:block}
.t-card-text{padding:20px 24px}
.t-card-text p{font-size:14px;color:var(--muted);line-height:1.6}

footer{padding:56px 0;text-align:center;border-top:1px solid var(--border)}
footer a{color:var(--muted);text-decoration:none;font-size:14px;transition:color .2s}footer a:hover{color:var(--accent)}
footer p{font-size:13px;color:var(--dim)}
.footer-links{display:flex;justify-content:center;gap:24px;margin-bottom:20px}
.divider{width:60px;height:1px;background:var(--border);margin:0 auto}

@media(max-width:768px){.container{padding:0 24px}nav .inner{padding:16px 24px}nav ul{display:none}.testimonial-grid{grid-template-columns:1fr}}
